# ================================================================
# SONARCLOUD — CONFIGURACIÓN DEL PROYECTO
# ================================================================
sonar.projectKey=Nik-920_tick_system_remoto
sonar.organization=nik-920
sonar.host.url=https://sonarcloud.io

# Nombre del proyecto que aparece en el dashboard de SonarCloud
sonar.projectName=Tick System
sonar.projectVersion=1.0

# ──────────────────────────────────────────────
# Código fuente
# ──────────────────────────────────────────────
# Carpetas que SonarCloud analizará como código fuente
sonar.sources=app,config,routes,resources/js

# Excluir archivos que NO deben contar como código de producción
sonar.exclusions=vendor/**,tests/**,public/**,node_modules/**,storage/**,bootstrap/cache/**

# ──────────────────────────────────────────────
# Tests
# ──────────────────────────────────────────────
sonar.tests=tests
sonar.test.inclusions=tests/**/*Test.php

# ──────────────────────────────────────────────
# Cobertura de código — LÍNEA CRÍTICA
# Apunta al archivo generado por PHPUnit (Clover format)
# ──────────────────────────────────────────────
sonar.php.coverage.reportPaths=coverage.xml

# Excluir de cobertura los archivos que temporalmente bajan el promedio del PR
sonar.coverage.exclusions=resources/js/**, resources/css/**, app/Http/Controllers/**, app/Http/Requests/**

# ──────────────────────────────────────────────
# Codificación
# ──────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
