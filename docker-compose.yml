version: '3.8'

services:
    # ==================== APP PHP-FPM ====================
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: infra-app
        restart: unless-stopped
        working_dir: /app
        volumes:
            - ./:/app
        networks:
            - infra-network
        depends_on:
            - db
        environment:
            - DB_HOST=db
            - DB_PORT=5432
            - DB_DATABASE=infra_tickets
            - DB_USERNAME=postgres
            - DB_PASSWORD=postgres123

    # ==================== NGINX ====================
    nginx:
        image: nginx:alpine
        container_name: infra-nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/app
            - ./nginx.conf:/etc/nginx/conf.d/default.conf
        networks:
            - infra-network
        depends_on:
            - app

    # ==================== POSTGRESQL (Supabase alternative) ====================
    db:
        image: postgres:15-alpine
        container_name: infra-db
        restart: unless-stopped
        environment:
            POSTGRES_DB: infra_tickets
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres123
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - infra-network
        ports:
            - "5432:5432"

    # ==================== REDIS (Cache) ====================
    redis:
        image: redis:7-alpine
        container_name: infra-redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        networks:
            - infra-network

volumes:
    postgres_data:

networks:
    infra-network:
        driver: bridge
