x-app-base: &app-base
    build:
        context: .
        dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /app
    env_file:
        - .env
    environment:
        APP_ENV: ${APP_ENV:-local}
        APP_DEBUG: ${APP_DEBUG:-true}
        APP_URL: ${APP_URL:-http://localhost:8000}
        SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
        SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
        SENTRY_SAMPLE_RATE: ${SENTRY_SAMPLE_RATE:-1.0}
        SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
        SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0.0}
        SENTRY_SEND_DEFAULT_PII: ${SENTRY_SEND_DEFAULT_PII:-false}
        SENTRY_ENABLE_LOGS: ${SENTRY_ENABLE_LOGS:-false}
        RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
        CACHE_STORE: redis
        SESSION_DRIVER: redis
        QUEUE_CONNECTION: redis
        REDIS_HOST: redis
        REDIS_PORT: 6379
        REDIS_PASSWORD: ""
    volumes:
        - ./:/app
    networks:
        - infra-network

services:
    app:
        <<: *app-base
        container_name: infra-app
        depends_on:
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "php-fpm -t || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s

    queue:
        <<: *app-base
        container_name: infra-queue
        command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
        environment:
            APP_ENV: ${APP_ENV:-local}
            APP_DEBUG: ${APP_DEBUG:-true}
            APP_URL: ${APP_URL:-http://localhost:8000}
            SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
            SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
            SENTRY_RELEASE: ${SENTRY_RELEASE:-}
            SENTRY_SAMPLE_RATE: ${SENTRY_SAMPLE_RATE:-1.0}
            SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
            SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0.0}
            SENTRY_SEND_DEFAULT_PII: ${SENTRY_SEND_DEFAULT_PII:-false}
            SENTRY_ENABLE_LOGS: ${SENTRY_ENABLE_LOGS:-false}
            RUN_MIGRATIONS: "false"
            CACHE_STORE: redis
            SESSION_DRIVER: redis
            QUEUE_CONNECTION: redis
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: ""
        depends_on:
            app:
                condition: service_healthy
            redis:
                condition: service_healthy

    nginx:
        image: nginx:1.27-alpine
        container_name: infra-nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/app:ro
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            app:
                condition: service_healthy
        networks:
            - infra-network
        healthcheck:
            test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s

    redis:
        image: redis:7-alpine
        container_name: infra-redis
        restart: unless-stopped
        command: ["redis-server", "--appendonly", "yes"]
        volumes:
            - redis_data:/data
        networks:
            - infra-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s

volumes:
    redis_data:

networks:
    infra-network:
        driver: bridge
